<app-header></app-header>
<main [@routeFadeAnimtation]>
    <div class="flavors-cards-container">
        <div class="cardapio-title">
            <h1>CARDAPIO</h1>
        </div>
        <mat-card class="flavor-card" *ngFor="let sabor of sabores">
            <img mat-card-image [src]="sabor.img" [alt]="sabor.sabor">
            <mat-card-content>
                <div class="flavor-name-overlay">
                    <span>{{sabor.sabor}}</span>
                </div>
                <div class="flavor-ingredients">
                    Ingredientes: {{sabor.ingredientes}}
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</main>
